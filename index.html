<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Заявка МЦ</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/suggestions-jquery@21.12.0/dist/css/suggestions.min.css"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/suggestions-jquery@21.12.0/dist/js/jquery.suggestions.min.js"></script>
</head>

<body>
    <div class="container">
        <form id="requestForm">
            <!-- Тип заявки -->
            <div class="section">
                <h2>Что требуется?</h2>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="media_type" id="type_photo" value="Фото" checked>
                        <label for="type_photo">📷 Фото</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="media_type" id="type_video" value="Видео">
                        <label for="type_video">🎥 Видео</label>
                    </div>
                </div>
            </div>

            <!-- Отправитель заявки -->
            <div class="section">
                <h2>Кто заказывает?</h2>

                <!-- Блок для обычной заявки (Сотрудники) -->
                <div id="block_sender">
                    <label>Отправитель <span class="required-mark">*</span></label>
                    <select id="sender_select" name="sender">
                        <option value="" disabled selected>Выберите из списка... ⌵</option>
                        <option value="МЦАО">МЦАО</option>
                        <option value="ЦПМС">ЦПМС</option>
                        <option value="ШМТО">ШМТО</option>
                        <option value="РЦДАО">РЦДАО</option>
                        <option value="Патриот">Патриот</option>
                        <option value="Полюс">Полюс</option>
                        <option value="other">Другое...</option>
                    </select>
                    <input type="text" id="sender_custom" name="custom_sender" class="hidden"
                        placeholder="Введите название организации">
                </div>

                <!-- Блок для внешней заявки (Клиенты) -->
                <div id="block_client" class="hidden">
                    <label>Заказчик <span class="required-mark">*</span></label>
                    <input type="text" id="client_name" name="client_name" placeholder="Введите ФИО или организацию">

                    <label style="margin-top: 10px;">Номер телефона</label>
                    <input type="tel" id="client_phone" name="client_phone" data-tel-input maxlength="18"
                        placeholder="+7 (___) ___-__-__">
                </div>
            </div>


            <!-- Поля для Фото -->
            <div id="photo_fields" class="section fade-in">
                <h2>📸 ТЗ для фотографа</h2>

                <label>Общее количество фото <span class="required-mark">*</span></label>
                <div class="range-group">
                    <input type="number" id="photo_count_from" name="photo_count_from" placeholder="От" min="1">
                    <span class="range-divider">—</span>
                    <input type="number" id="photo_count_to" name="photo_count_to" placeholder="До" min="1">
                </div>

                <label style="margin-top: 10px;">Сколько нужно СРАЗУ?</label>
                <div class="range-group">
                    <input type="number" id="photo_fast_from" name="photo_fast_from" placeholder="От" min="1">
                    <span class="range-divider">—</span>
                    <input type="number" id="photo_fast_to" name="photo_fast_to" placeholder="До" min="1">
                </div>
            </div>

            <!-- Поля для Видео -->
            <div id="video_fields" class="section hidden">
                <h2>🎬 ТЗ для видеографа</h2>

                <label>Длительность ролика</label>
                <input type="text" id="video_duration" name="video_duration" placeholder="Например: до 1 минуты">

                <label>Формат видео</label>
                <select id="video_format" name="video_format">
                    <option value="" disabled selected>Выберите из списка... ⌵</option>
                    <option value="Горизонтальное">Горизонтальное</option>
                    <option value="Вертикальное">Вертикальное</option>
                    <option value="Квадратное">Квадратное</option>
                </select>

                <div class="toggle-wrapper" style="margin-top: 15px; display: flex; align-items: center;">
                    <label class="switch">
                        <input type="checkbox" id="video_interview_check" name="video_interview_check">
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label" style="margin-left: 10px; flex: 1;">Нужно интервью/синхрон?</span>
                </div>

                <div id="interview_details" class="hidden" style="margin-top: 10px;">
                    <label>Кто в кадре?</label>
                    <input type="text" id="interview_who" name="interview_who" placeholder="Имена, должности">

                    <label>Вопросы для интервью</label>
                    <textarea id="interview_questions" name="interview_questions" rows="3"
                        placeholder="Список вопросов..."></textarea>
                </div>

                <label>Настроение ролика</label>
                <select id="video_mood" name="video_mood">
                    <option value="" disabled selected>Выберите из списка... ⌵</option>
                    <option value="Радостный">Радостный</option>
                    <option value="Грустный">Грустный / Серьезный</option>
                    <option value="Динамичный">Динамичный</option>
                    <option value="Спокойный">Спокойный</option>
                    <option value="other">Другое...</option>
                </select>
                <input type="text" id="video_mood_custom" name="video_mood_custom" class="hidden"
                    placeholder="Опишите настроение">

                <label>Темп монтажа</label>
                <select id="video_pace" name="video_pace">
                    <option value="" disabled selected>Выберите из списка... ⌵</option>
                    <option value="Быстрый">Быстрый</option>
                    <option value="Средний">Средний</option>
                    <option value="Медленный">Медленный</option>
                </select>

                <label>Логотипы:</label>
                <span class="hint-text">Написать при наличии, например АПДМ</span>
                <input type="text" id="video_logos" name="video_logos" placeholder="Введите логотипы...">
            </div>

            <!-- Общие данные -->
            <div class="section">
                <h2>📅 Дата и место</h2>

                <label>Дата начала <span class="required-mark">*</span></label>
                <input type="date" id="event_date" name="event_date">

                <div class="toggle-wrapper" style="margin-top: 5px; margin-bottom: 15px; display: flex; align-items: center;">
                    <label class="switch">
                        <input type="checkbox" id="multi_day_check" name="is_multi_day">
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label" style="margin-left: 10px; flex: 1; font-size: 14px;">Мероприятие длится несколько дней</span>
                </div>

                <div id="end_date_block" class="hidden">
                    <label>Дата окончания <span class="required-mark">*</span></label>
                    <input type="date" id="event_date_end" name="event_date_end">
                </div>

                <div class="time-row">
                    <div>
                        <label>Начало <span class="required-mark">*</span></label>
                        <input type="time" id="event_time" name="event_time">
                    </div>
                    <div>
                        <label>Окончание <span class="required-mark">*</span></label>
                        <input type="time" id="event_time_end" name="event_time_end">
                    </div>
                </div>

                <label>Место проведения <span class="required-mark">*</span></label>
                <div style="position: relative;">
                    <input type="text" id="event_location" name="location"
                        placeholder="Начните вводить адрес (например, Троицкий 118)..." autocomplete="off">
                </div>

                <label style="margin-top: 15px;">Есть ли трансфер?</label>
                <div class="radio-group" style="display: flex; gap: 10px;">
                    <div class="radio-option" style="flex: 1;">
                        <input type="radio" name="transfer" id="transfer_yes" value="Да">
                        <label for="transfer_yes"
                            style="display: block; text-align: center; border: 1px solid #ccc; padding: 10px; border-radius: 8px; cursor: pointer;">✅
                            Да</label>
                    </div>
                    <div class="radio-option" style="flex: 1;">
                        <input type="radio" name="transfer" id="transfer_no" value="Нет" checked>
                        <label for="transfer_no"
                            style="display: block; text-align: center; border: 1px solid #ccc; padding: 10px; border-radius: 8px; cursor: pointer;">❌
                            Нет</label>
                    </div>
                </div>

                <label style="margin-top: 15px;">Краткое описание мероприятия <span
                        class="required-mark">*</span></label>
                <textarea id="event_desc" name="description" rows="3" placeholder="Что будет происходить?"></textarea>

                <label>Срок сдачи материалов</label>
                <select id="deadline_select" name="deadline">
                    <option value="" disabled selected>Выберите из списка... ⌵</option>
                    <option value="В день мероприятия">В день мероприятия</option>
                    <option value="На следующий день">На следующий день</option>
                    <option value="В течение 3 дней">В течение 3 дней</option>
                    <option value="other">Другой срок...</option>
                </select>
                <input type="text" id="deadline_custom" name="custom_deadline" class="hidden"
                    placeholder="Укажите срок">
            </div>

            <!-- Кнопки -->
            <div class="section">
                <div class="button-group">
                    <button type="button" id="btn_publish" class="main-button">Опубликовать заявку</button>
                    <button type="button" id="btn_clear" class="secondary-button">Очистить поля</button>
                </div>
            </div>

            <div style="height: 50px;"></div>
        </form>
    </div>

    <!-- JS -->
    <script src="script.js"></script>
</body>

</html>
